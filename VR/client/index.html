<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPARC VR Client</title>
  <link rel="stylesheet" href="./app.css" />
</head>

<body>
  <div id="status">disconnected</div>
  <div id="join-panel">
    <label for="character-mode">Character</label>
    <select id="character-mode"></select>
    <button id="join-btn">Join Field</button>
    <button id="spectate-btn">Join as Spectator</button>
    <button id="arm-camera-btn">Join Arm Camera</button>
  </div>
  <div id="arm-camera-panel">
    <div class="panel-caption">Experimental arm camera</div>
    <label for="arm-camera-user">Character</label>
    <select id="arm-camera-user"></select>
    <label for="arm-camera-arm">Arm</label>
    <select id="arm-camera-arm"></select>
  </div>
  <button id="start-btn">Enter VR</button>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./app.js"></script>
</body>

</html>
