<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPARC VR Client</title>
  <style>
    html,
    body,
    canvas {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      color: #f9f9f9;
      background: rgba(0, 0, 0, 0.6);
      font-family: Menlo, monospace;
      z-index: 10;
      border-radius: 6px;
    }

    #start-btn {
      position: fixed;
      top: 52px;
      left: 12px;
      z-index: 10;
      padding: 8px 12px;
      border: 0;
      border-radius: 6px;
      background: #1c7ed6;
      color: white;
      font-family: Menlo, monospace;
      cursor: pointer;
    }

    #join-panel,
    #arm-camera-panel {
      position: fixed;
      right: 12px;
      z-index: 10;
      padding: 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.68);
      color: #f9f9f9;
      font-family: Menlo, monospace;
      display: grid;
      gap: 6px;
      min-width: 190px;
    }

    #join-panel {
      top: 12px;
    }

    #arm-camera-panel {
      top: 188px;
      display: none;
    }

    #join-panel select,
    #join-panel button,
    #arm-camera-panel select {
      font-family: Menlo, monospace;
      padding: 5px 6px;
      border-radius: 4px;
      border: none;
    }

    #join-panel button {
      background: #2f9e44;
      color: white;
      cursor: pointer;
    }

    #spectate-btn {
      background: #6c757d;
    }

    #arm-camera-btn {
      background: #1971c2;
    }

    .panel-caption {
      font-size: 12px;
      color: #ced4da;
    }
  </style>
</head>

<body>
  <div id="status">disconnected</div>
  <div id="join-panel">
    <label for="character-mode">Character</label>
    <select id="character-mode"></select>
    <button id="join-btn">Join Field</button>
  </div>
  <button id="start-btn">Enter VR</button>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./app.js"></script>
</body>

</html>
