default_stages: [commit, push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: LICENSE
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run --no-sync black --config pyproject.toml
        types: [python]
        language: system
